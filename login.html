<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Career Reflection Toolkit</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px;
    }
    .wrap { width: 100%; max-width: 400px; }

    .logo-area { text-align: center; margin-bottom: 28px; }
    .logo-badge { display: inline-block; background: #2d5be3; color: #fff; font-size: 12px; font-weight: 600; padding: 5px 16px; border-radius: 20px; letter-spacing: 0.05em; margin-bottom: 12px; }
    .logo-area h1 { font-size: 26px; font-weight: 600; color: #1a1a18; }
    .logo-area p { font-size: 14px; color: #6b6a64; margin-top: 5px; }

    .role-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .role-tab { padding: 14px 10px; border: 1.5px solid #e2e0d8; border-radius: 10px; text-align: center; cursor: pointer; background: #fff; transition: all 0.15s; }
    .role-tab:hover { border-color: #6b8ef0; background: #edf1fd; }
    .role-tab.active { border-color: #2d5be3; background: #edf1fd; }
    .rt-icon { font-size: 24px; margin-bottom: 6px; }
    .rt-title { font-size: 14px; font-weight: 600; color: #1a1a18; }
    .rt-sub { font-size: 11px; color: #6b6a64; margin-top: 2px; }
    .role-tab.active .rt-title { color: #2d5be3; }

    .form-card { background: #fff; border: 1px solid #e2e0d8; border-radius: 14px; padding: 24px; }
    .card-title { font-size: 15px; font-weight: 600; color: #1a1a18; margin-bottom: 18px; }

    .err-box { background: #fdecea; color: #c0392b; border: 1px solid #f5c6c6; font-size: 13px; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; display: none; }
    .err-box.show { display: block; }

    .fg { margin-bottom: 14px; }
    label { font-size: 13px; font-weight: 500; color: #6b6a64; display: block; margin-bottom: 5px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 11px 14px;
      border: 1px solid #e2e0d8; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 14px;
      color: #1a1a18; background: #fff; transition: border 0.12s;
    }
    input:focus { outline: none; border-color: #2d5be3; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 16px; color: #9e9d96; padding: 2px; }

    .login-btn { width: 100%; padding: 12px; background: #2d5be3; color: #fff; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: background 0.12s; margin-top: 4px; }
    .login-btn:hover { background: #2449c7; }

    .forgot { text-align: center; margin-top: 14px; font-size: 13px; color: #9e9d96; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-badge">NIU · Career Toolkit</div>
    <h1>Welcome back</h1>
    <p>Sign in to access your dashboard</p>
  </div>

  <div class="role-tabs">
    <div class="role-tab active" id="tab-admin" onclick="switchRole('admin')">
      <div class="rt-icon">🎓</div>
      <div class="rt-title">Admin</div>
      <div class="rt-sub">Instructor / College</div>
    </div>
    <div class="role-tab" id="tab-student" onclick="switchRole('student')">
      <div class="rt-icon">👤</div>
      <div class="rt-title">Student</div>
      <div class="rt-sub">Access your profile</div>
    </div>
  </div>

  <div class="form-card">
    <div class="err-box" id="err"></div>

    <!-- ADMIN FORM -->
    <div id="admin-form">
      <div class="card-title">Admin login</div>
      <div class="fg">
        <label>Username</label>
        <input type="text" id="admin-user" placeholder="Enter admin username">
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="admin-pw" placeholder="Enter admin password">
          <button class="eye-btn" onclick="toggleEye('admin-pw',this)">👁</button>
        </div>
      </div>
      <button class="login-btn" onclick="adminLogin()">Sign in →</button>
    </div>

    <!-- STUDENT FORM -->
    <div id="student-form" style="display:none;">
      <div class="card-title">Student login</div>
      <div class="fg">
        <label>Username</label>
        <input type="text" id="student-user" placeholder="Enter your username">
      </div>
      <div class="fg">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="student-pw" placeholder="Enter your password">
          <button class="eye-btn" onclick="toggleEye('student-pw',this)">👁</button>
        </div>
      </div>
      <button class="login-btn" onclick="studentLogin()">Sign in →</button>
      <div class="forgot">Contact your instructor if you forgot your password.</div>
    </div>
  </div>
</div>

<script>
// Student credentials — username is firstname (lowercase), password is firstname@niu
// Admin can change these from the admin panel
var STUDENTS = [
  {id:"s01", name:"Aarav Sharma",   username:"aarav",  password:"aarav@niu",   course:"Computer Science",       year:2, avatar:"AS"},
  {id:"s02", name:"Priya Nair",     username:"priya",  password:"priya@niu",   course:"Business Administration",year:3, avatar:"PN"},
  {id:"s03", name:"Rohan Mehta",    username:"rohan",  password:"rohan@niu",   course:"Mechanical Engineering", year:1, avatar:"RM"},
  {id:"s04", name:"Sneha Kulkarni", username:"sneha",  password:"sneha@niu",   course:"Psychology",             year:4, avatar:"SK"},
  {id:"s05", name:"Arjun Verma",    username:"arjun",  password:"arjun@niu",   course:"Data Science",           year:2, avatar:"AV"},
  {id:"s06", name:"Meera Iyer",     username:"meera",  password:"meera@niu",   course:"Architecture",           year:3, avatar:"MI"},
  {id:"s07", name:"Karan Bose",     username:"karan",  password:"karan@niu",   course:"Finance",                year:2, avatar:"KB"},
  {id:"s08", name:"Divya Pillai",   username:"divya",  password:"divya@niu",   course:"Biotechnology",          year:3, avatar:"DP"},
  {id:"s09", name:"Vikram Desai",   username:"vikram", password:"vikram@niu",  course:"Law",                    year:1, avatar:"VD"},
  {id:"s10", name:"Ananya Singh",   username:"ananya", password:"ananya@niu",  course:"Design & Communication", year:4, avatar:"AN"}
];

var ADMIN = { username: "admin", password: "niu2026" };

// Seed localStorage
(function() {
  if (!localStorage.getItem('ct_students')) {
    localStorage.setItem('ct_students', JSON.stringify(STUDENTS));
  }
  if (!localStorage.getItem('ct_admin')) {
    localStorage.setItem('ct_admin', JSON.stringify(ADMIN));
  }
})();

function switchRole(r) {
  document.getElementById('admin-form').style.display   = r === 'admin'   ? 'block' : 'none';
  document.getElementById('student-form').style.display = r === 'student' ? 'block' : 'none';
  document.getElementById('tab-admin').classList.toggle('active',   r === 'admin');
  document.getElementById('tab-student').classList.toggle('active', r === 'student');
  document.getElementById('err').classList.remove('show');
}

function adminLogin() {
  var user = document.getElementById('admin-user').value.trim();
  var pw   = document.getElementById('admin-pw').value.trim();
  if (!user || !pw) { showErr('Please enter username and password.'); return; }
  var admin = JSON.parse(localStorage.getItem('ct_admin'));
  if (user === admin.username && pw === admin.password) {
    sessionStorage.setItem('ct_role', 'admin');
    sessionStorage.removeItem('ct_current');
    window.location.href = 'admin.html';
  } else {
    showErr('Incorrect username or password.');
    document.getElementById('admin-pw').value = '';
  }
}

function studentLogin() {
  var user = document.getElementById('student-user').value.trim().toLowerCase();
  var pw   = document.getElementById('student-pw').value.trim();
  if (!user || !pw) { showErr('Please enter your username and password.'); return; }
  var students = JSON.parse(localStorage.getItem('ct_students'));
  var match = students.find(function(s) { return s.username === user && s.password === pw; });
  if (match) {
    sessionStorage.setItem('ct_role', 'student');
    sessionStorage.setItem('ct_current', match.id);
    window.location.href = 'dashboard.html';
  } else {
    showErr('Incorrect username or password. Contact your instructor.');
    document.getElementById('student-pw').value = '';
  }
}

function toggleEye(id, btn) {
  var inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

function showErr(msg) {
  var el = document.getElementById('err');
  el.textContent = msg; el.classList.add('show');
}

document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('admin-form').style.display !== 'none') adminLogin();
  else studentLogin();
});
</script>
</body>
</html>
